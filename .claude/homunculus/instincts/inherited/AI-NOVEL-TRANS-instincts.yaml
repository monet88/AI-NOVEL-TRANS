# AI NOVEL TRANS Workflow Feature Development With Plans And Docs

## Action

Follow the feature-development-with-plans-and-docs workflow:
1. Create or update detailed plan documents under plans/{feature}/ (phases, plan.md)
2. Implement feature across relevant code files (e.g., components/, services/, server/)
3. Update product documentation (docs/product/, docs/ARCHITECTURE.md, etc.)
4. Add or update tests (e.g., hooks/*.test.ts, services/*.test.ts, server/tests/)
5. Update package files or configuration as needed (e.g., package.json, requirements.txt)
6. Generate and update reports under plans/reports/

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: plans/{feature}/phase-*.md, plans/{feature}/plan.md, plans/reports/*{feature}*.md

