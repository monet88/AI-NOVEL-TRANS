<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Novel Weaver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
            colors: {
              'dark-bg': '#0B0F19',
              'dark-sidebar': '#161C2C',
              'dark-panel': '#161C2C',
              'dark-input': '#222B44',
              'dark-hover': '#2D3754',
              'accent-primary': '#6366F1',
              'accent-primary-hover': '#818CF8',
              'accent-secondary': '#8B5CF6',
              'accent-secondary-hover': '#A78BFA',
              'text-primary': '#F9FAFB',
              'text-secondary': '#9CA3AF',
              'border-color': '#222B44',
              'success': '#10B981',
              'danger': '#F43F5E',
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out',
              'fade-in-up': 'fadeInUp 0.4s ease-out forwards',
              'grow-in-vertical': 'growInVertical 0.2s ease-out forwards',
              'slide-in-left': 'slideInLeft 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              growInVertical: {
                '0%': { transform: 'scaleY(0)' },
                '100%': { transform: 'scaleY(1)' },
              },
              slideInLeft: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      .stagger-1 { animation-delay: 50ms; opacity: 0; }
      .stagger-2 { animation-delay: 100ms; opacity: 0; }
      .stagger-3 { animation-delay: 150ms; opacity: 0; }
      .stagger-4 { animation-delay: 200ms; opacity: 0; }
      .stagger-5 { animation-delay: 250ms; opacity: 0; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.1.1/",

    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.20.0",
    "uuid": "https://aistudiocdn.com/uuid@^13.0.0",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.1.1"
  }
}
</script>
</head>
  <body class="bg-dark-bg text-text-primary">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
